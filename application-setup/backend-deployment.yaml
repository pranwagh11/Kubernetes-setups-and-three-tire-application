apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
      - name: backend

        image: username/todo-backend:v1

        ports:
        - containerPort: 4000

        env:
        - name: DB_HOST
          value: mysql-service

        - name: DB_PORT
          value: "3306"

        - name: DB_USER
          value: root

        - name: DB_PASSWORD
          value: root1234

        - name: DB_NAME
          value: todo_db