apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend
  namespace: todo-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
      - name: frontend
        image: prandocker01/frontend-todo

        ports:
        - containerPort: 80

        volumeMounts:
        - name: frontend-config
          mountPath: /usr/share/nginx/html/configs.js
          subPath: configs.js

      volumes:
      - name: frontend-config
        configMap:
          name: frontend-config